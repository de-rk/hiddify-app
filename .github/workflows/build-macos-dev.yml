name: Build macOS Dev

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install deps
        run: brew install tree

      - name: Download core libs
        run: make macos-libs

      - name: Prepare
        run: make common-prepare

      - name: Build macOS
        run: flutter build macos --release --dart-define sentry_dsn=

      - name: Package app
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" | head -1)
          echo "Found app: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/Hiddify-Dev-macOS.zip" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Hiddify-Dev-macOS
          path: Hiddify-Dev-macOS.zip
          retention-days: 7
